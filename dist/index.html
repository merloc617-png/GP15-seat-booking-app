<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="An accessible, internationalised seat-booking demo">
    <title data-i18n="app.title">Seat Booking</title>
  <script type="module" crossorigin src="/assets/main-Cp945M1X.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/zh-9n3UZvhH.js">
  <link rel="stylesheet" crossorigin href="/assets/zh-DY6utmvt.css">
</head>
<body>
    <a class="skip-link" href="#main" data-i18n="skip.toMain">Skip to main content</a>

    <header class="site-header" role="banner">
        <h1 class="site-header__title" data-i18n="app.title">Seat Booking</h1>
        <div class="site-header__actions">
            <button id="lang-toggle" type="button" class="btn btn--ghost"
                    aria-label="Switch language">中文</button>
        </div>
    </header>

    <main id="main" class="site-main">
        <div id="seat-booking-app">

            <section id="settings" class="settings" aria-labelledby="settings-heading">
                <h2 id="settings-heading" class="sr-only" data-i18n="app.title">Settings</h2>

                <div class="services-list">
                    <label for="services-list" data-i18n="settings.serviceLabel">Current movie</label>
                    <select name="services-list" id="services-list"></select>

                    <label for="service-name" data-i18n="settings.movie">Movie title</label>
                    <input type="text" name="service-name" id="service-name"
                           maxlength="80" autocomplete="off" required>

                    <label for="service-price" data-i18n="settings.priceBase">Price base</label>
                    <input type="number" name="service-price" id="service-price"
                           min="0" max="1000" step="0.01" inputmode="decimal" required>

                    <div id="settings-errors" class="settings__errors"
                         role="alert" aria-live="polite" hidden></div>

                    <div class="services-list__btns">
                        <button id="service-add-btn"     type="button" class="btn" data-i18n="settings.add">Add new</button>
                        <button id="service-update-btn"  type="button" class="btn" data-i18n="settings.update">Save changes</button>
                        <button id="service-delete-btn"  type="button" class="btn btn--danger" data-i18n="settings.delete">Delete</button>
                    </div>
                </div>

                <div class="sectors" aria-labelledby="sectors-heading">
                    <h3 id="sectors-heading" data-i18n="sectors.heading">Price multipliers per sector</h3>
                    <ul id="sectors-list" class="sectors__list"></ul>
                </div>

                <div id="order" class="order" aria-labelledby="order-heading">
                    <div class="order__header">
                        <h3 id="order-heading" data-i18n="order.heading">Tickets</h3>
                    </div>
                    <div class="order__main">
                        <ul id="order-details" aria-live="polite"></ul>
                    </div>
                    <div id="order-footer" class="order__footer">
                        <span id="order-total-price" aria-live="polite"></span>
                        <button id="book-seats-btn" type="button" class="btn btn--primary"
                                data-i18n="order.book">Buy</button>
                    </div>
                </div>
            </section>

            <section id="screening-room-1" aria-label="Screening room 1">
                <div id="screen" data-i18n="screen.label">Screen</div>
                <div id="seats"></div>
            </section>

        </div>
    </main>

    <footer class="site-footer" role="contentinfo">
        <a href="/privacy.html" data-i18n="consent.privacyLink">Privacy policy</a>
    </footer>

</body>
</html>
